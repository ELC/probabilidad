name: Deploy to Github Pages


on:
  push:
    branches: master

  workflow_dispatch:
  repository_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.02

    - uses: actions/setup-node@49933ea5288caeca8642d134e59bf458759112a8  # v4.4.0
      with:
        node-version: 22

    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
      with:
        python-version: 3.13

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Lint and build the book
      env:
        # Subpath for project Pages (not *.github.io); see https://mystmd.org/guide/deployment-github-pages
        BASE_URL: /${{ github.event.repository.name }}
      run: uv run poe ci

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: Github Pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
