name: CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Lint and build the book
        env:
          # Subpath for project Pages (not *.github.io); see https://mystmd.org/guide/deployment#deploy-base-url
          BASE_URL: /${{ github.event.repository.name }}
        run: uv run poe ci

  check-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Binder Dockerfile revision
        run: |
          echo "Building commit: $(git rev-parse HEAD)"
          head -n 25 .binder/Dockerfile
          if grep -q '^RUN uv sync --all-groups --locked$' .binder/Dockerfile; then
            echo "::error::Stale .binder/Dockerfile (missing root rm + UV_PROJECT_ENVIRONMENT). Push the latest branch commit or re-run the newest workflow run, not an old one."
            exit 1
          fi

      - name: Prepare clean Docker context
        run: rm -rf .venv venv

      - name: Build Binder Docker image
        run: docker build --no-cache -f .binder/Dockerfile -t jupyter-book-template:binder .
