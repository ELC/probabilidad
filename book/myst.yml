# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: Probabilidad y Estadística
  copyright: "2026, Ezequiel Leonardo Castaño"

  authors:
    - name: Ezequiel Leonardo Castaño
      github: "@ELC"
      linkedin: https://www.linkedin.com/in/ezequielcastano/

  github: https://github.com/ELC/probabilidad

  bibliography:
    - bibliography.bib

  numbering:
    headings: true

  jupyter: true

  plugins:
    - plugins/ethicalads.mjs

  toc:
    - file: chapters/descriptive_statistics.ipynb
      children:
        - file: chapters/descriptive_statistics_exercises.md
    - file: chapters/probability.ipynb
      children:
        - file: chapters/probability_exercises.md
    - file: chapters/random_variables.ipynb
      children:
        - file: chapters/random_variables_exercises.md
    - file: chapters/joint_and_sums.ipynb
      children:
        - file: chapters/joint_and_sums_exercises.md
    - file: chapters/inference.ipynb
      children:
        - file: chapters/inference_exercises.md
    - file: chapters/glossary.md
    - file: chapters/pedagogy.md

site:
  template: book-theme
  parts:
    banner: |
      :::{ethicalads}
      :::

  nav:
    - title: Tratamiento de datos
      url: /chapters/descriptive-statistics
    - title: Probabilidad
      url: /chapters/probability
    - title: Variables aleatorias
      url: /chapters/random-variables
    - title: Sumas y promedios
      url: /chapters/joint-and-sums
    - title: Inferencia
      url: /chapters/inference
    - title: Glosario
      url: /chapters/glossary
    - title: Enfoque pedagógico
      url: /chapters/pedagogy

  options:
    folders: true
    numbered_references: true
    favicon: assets/favicon.ico
    logo: assets/logo.svg
    logo-dark: assets/logo-dark.svg

    # https://mystmd.org/guide/analytics#google-analytics
    analytics_google: G-Y3GBPLEV2K
