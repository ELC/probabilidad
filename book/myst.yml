version: 1
project:
  title: "(REPLACE WITH Book Title)"
  copyright: "2026, Ezequiel Leonardo Castaño"

  authors:
    - name: Ezequiel Leonardo Castaño
      github: "@ELC"
      linkedin: https://www.linkedin.com/in/ezequielcastano/

  github: https://github.com/ELC/jupyter-book-template

  bibliography:
    - bibliography.bib

  numbering:
    headings: true

  # TEMPORARY: Binder ref for local/testing on this branch — revert before merge.
  jupyter:
    binder:
      ref: add-docker-validation-to-cicd

  plugins:
    - plugins/ethicalads.mjs

  toc:
