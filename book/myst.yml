  options:
    folders: true
    numbered_references: true
    favicon: assets/favicon.ico
    logo: assets/logo.svg
    logo-dark: assets/logo-dark.svg

    # https://mystmd.org/guide/analytics#google-analytics
    analytics_google: G-Y3GBPLEV2K
