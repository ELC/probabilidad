exclude: ^(_build/|\.venv/)

default_language_version:
  python: python3.13

.hook-dependencies: &hook-deps
  - altair>=5.4
  - anywidget>=0.9
  - ipywidgets>=8.1
  - jupyter-book==2.1.5
  - matplotlib==3.10.8
  - mypy==2.1.0
  - numpy>=2.0
  - pandas==3.0.1
  - pandas-stubs==3.0.0.260204
  - pandera[mypy]==0.30.1
  - pydantic>=2.0
  - pydantic-settings>=2.0
  - pylint==4.0.5
  - pytest>=8.3
  - ruff==0.15.15
  - scipy>=1.14
  - seaborn==0.13.2
  - statsmodels>=0.14
  - sympy>=1.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v1.1.1
    hooks:
      - id: tombi-format
      - id: tombi-lint

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        exclude: \.ipynb$
        args:
          - "--exit-non-zero-on-fix"

      - id: ruff-format
        exclude: \.ipynb$

  - repo: https://github.com/pylint-dev/pylint
    rev: v4.0.5
    hooks:
      - id: pylint
        exclude: \.ipynb$
        additional_dependencies: *hook-deps

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        exclude: \.ipynb$
        additional_dependencies: *hook-deps

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff-format
        additional_dependencies: *hook-deps

      - id: nbqa-ruff-check
        additional_dependencies: *hook-deps
        args:
          - "--exit-non-zero-on-fix"

      - id: nbqa-pylint
        additional_dependencies: *hook-deps

      - id: nbqa-mypy
        additional_dependencies: *hook-deps

  # - repo: https://github.com/JuanJFarina/pymetrica
  #   rev: v1.5.6
  #   hooks:
  #     - id: pymetrica
